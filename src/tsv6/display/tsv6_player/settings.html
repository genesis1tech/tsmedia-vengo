<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>TSV6 Settings</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #151923;
    --panel-2: #1d2230;
    --text: #e8ecf4;
    --muted: #8a93a8;
    --accent: #3d8bfd;
    --accent-dim: #2e6cc8;
    --ok: #2ecc71;
    --err: #e74c3c;
    --border: #2a3142;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 18px;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .app {
    display: flex; flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 22px; margin: 0; font-weight: 600; }
  .status {
    font-size: 14px; color: var(--muted);
    padding: 6px 12px; background: var(--panel-2); border-radius: 6px;
    max-width: 60%; text-align: right;
  }
  .status.connected { color: var(--ok); }
  button.btn {
    background: var(--accent); color: white; border: 0; font-weight: 600;
    padding: 14px 22px; border-radius: 8px; font-size: 17px;
    cursor: pointer; min-height: 48px;
  }
  button.btn:active { background: var(--accent-dim); }
  button.btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
  button.btn.danger { background: var(--err); }

  main {
    flex: 1; overflow-y: auto;
    padding: 12px 14px;
  }
  .section-title {
    display: flex; justify-content: space-between; align-items: center;
    margin: 8px 4px 10px;
  }
  .section-title h2 { margin: 0; font-size: 18px; font-weight: 600; }

  .network-list { display: flex; flex-direction: column; gap: 8px; }
  .network {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel);
    padding: 14px 16px; border-radius: 10px;
    border: 1px solid var(--border);
    min-height: 64px;
    cursor: pointer;
  }
  .network:active { background: var(--panel-2); }
  .network.selected { border-color: var(--accent); background: var(--panel-2); }
  .network .ssid { font-weight: 600; font-size: 17px; }
  .network .meta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .network .right { display: flex; align-items: center; gap: 10px; }
  .bars { font-family: monospace; font-size: 14px; letter-spacing: 1px; color: var(--muted); min-width: 36px; text-align: right; }
  .lock { font-size: 14px; color: var(--muted); }
  .in-use { color: var(--ok); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
  .saved { color: var(--accent); font-size: 12px; font-weight: 700; letter-spacing: 0.05em; }
  .group-heading {
    margin: 14px 4px 8px;
    font-size: 13px; font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .group-heading:first-child { margin-top: 2px; }

  .empty, .loading {
    padding: 40px 14px; text-align: center; color: var(--muted);
  }

  /* Connect form */
  .connect-panel {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border-top: 2px solid var(--accent);
    padding: 14px 18px 18px;
    transform: translateY(120%);
    transition: transform .25s ease-out;
    max-height: 78vh;
    overflow-y: auto;
    box-shadow: 0 -8px 24px rgba(0,0,0,.5);
  }
  .connect-panel.open { transform: translateY(0); }
  .connect-panel h3 { margin: 2px 0 10px; font-size: 18px; }
  .connect-panel .ssid-label { color: var(--accent); }
  .pw-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
  .pw-display {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    font-size: 20px;
    font-family: monospace;
    min-height: 54px;
    word-break: break-all;
  }
  .pw-display.empty { color: var(--muted); }
  .pw-display.masked { letter-spacing: 3px; }
  .pw-display.saved-placeholder { color: var(--muted); letter-spacing: 3px; }
  .pw-hint { font-size: 12px; color: var(--muted); margin-top: 6px; min-height: 16px; }

  /* Virtual keyboard */
  .kb { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .kb-row { display: flex; gap: 5px; justify-content: center; }
  .key {
    flex: 1;
    min-height: 50px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 17px;
    font-weight: 500;
    padding: 0;
    cursor: pointer;
  }
  .key:active { background: var(--accent); }
  .key.wide { flex: 2; }
  .key.wide2 { flex: 3; }
  .key.accent { background: var(--accent); color: white; }
  .key.mod { background: #2a3142; font-size: 13px; color: var(--muted); }
  .key.mod.active { background: var(--accent); color: white; }

  .form-actions { display: flex; gap: 10px; margin-top: 12px; }
  .form-actions .btn { flex: 1; }

  .toast {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--border);
    padding: 12px 18px; border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.5);
    font-weight: 500; z-index: 1000;
    opacity: 0; transition: opacity .2s;
    max-width: 90%;
  }
  .toast.show { opacity: 1; }
  .toast.ok { border-color: var(--ok); color: var(--ok); }
  .toast.err { border-color: var(--err); color: var(--err); }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Settings</h1>
    <div id="status" class="status">—</div>
    <button class="btn secondary" id="closeBtn">Close</button>
  </header>

  <main>
    <div class="section-title">
      <h2>Wi-Fi Networks</h2>
      <button class="btn secondary" id="rescanBtn">Rescan</button>
    </div>
    <div id="networks" class="network-list">
      <div class="loading">Scanning…</div>
    </div>
  </main>
</div>

<div id="connect" class="connect-panel">
  <h3>Connect to <span id="selSsid" class="ssid-label">—</span></h3>
  <div class="pw-row">
    <div id="pwDisplay" class="pw-display empty">Password</div>
    <button class="btn secondary" id="togglePw" title="Show/hide">Show</button>
  </div>
  <div id="pwHint" class="pw-hint"></div>
  <div class="kb" id="kb"></div>
  <div class="form-actions">
    <button class="btn secondary" id="cancelBtn">Cancel</button>
    <button class="btn" id="connectBtn">Connect</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
(function () {
  var $ = function (id) { return document.getElementById(id); };
  var netsEl = $("networks"), statusEl = $("status"), toastEl = $("toast");
  var connectPanel = $("connect"), selSsidEl = $("selSsid");
  var pwDisplay = $("pwDisplay"), togglePw = $("togglePw"), kbEl = $("kb");
  var pwHint = $("pwHint");

  var selectedSsid = null;
  var selectedSecurity = "";
  var password = "";
  var pwVisible = false;
  var kbMode = "abc"; // abc | ABC | sym
  // True when the selected network has a saved NetworkManager profile and the
  // user hasn't typed a replacement password — in that case Connect reuses the
  // stored credentials via `nmcli connection up`.
  var useSaved = false;

  function exitSettings() {
    // Ping backend so it can resume the idle player (restart VLC) before we navigate away.
    fetch("/api/exit-settings", { method: "POST" })
      .catch(function () {})
      .finally(function () { window.location.href = "/"; });
  }

  function toast(msg, cls, ms) {
    toastEl.textContent = msg;
    toastEl.className = "toast show " + (cls || "");
    setTimeout(function () { toastEl.className = "toast"; }, ms || 2500);
  }

  function bars(sig) {
    var n = Math.min(4, Math.max(0, Math.round((Number(sig) || 0) / 25)));
    return "▂▄▆█".slice(0, n).padEnd(4, "·");
  }

  function refreshStatus() {
    fetch("/api/wifi/status").then(function (r) { return r.json(); }).then(function (d) {
      if (d.connected && d.current) {
        statusEl.textContent = "✓ " + d.current.ssid + (d.ip ? " · " + d.ip : "");
        statusEl.classList.add("connected");
      } else {
        statusEl.textContent = "Not connected";
        statusEl.classList.remove("connected");
      }
    }).catch(function () { statusEl.textContent = "(status unavailable)"; });
  }

  function renderNetworks(list) {
    if (!list.length) {
      netsEl.innerHTML = '<div class="empty">No networks found. Tap Rescan.</div>';
      return;
    }
    netsEl.innerHTML = "";
    var known = list.filter(function (n) { return n.known; });
    var other = list.filter(function (n) { return !n.known; });
    if (known.length) {
      appendHeading("Saved Networks");
      known.forEach(appendNetworkRow);
    }
    if (other.length) {
      appendHeading(known.length ? "Other Networks" : "Available Networks");
      other.forEach(appendNetworkRow);
    }
  }

  function appendHeading(label) {
    var h = document.createElement("div");
    h.className = "group-heading";
    h.textContent = label;
    netsEl.appendChild(h);
  }

  function appendNetworkRow(n) {
    var row = document.createElement("div");
    row.className = "network";
    if (n.ssid === selectedSsid) row.classList.add("selected");
    var badges = "";
    if (n.in_use) badges += ' <span class="in-use">CONNECTED</span>';
    else if (n.known) badges += ' <span class="saved">SAVED</span>';
    var left = document.createElement("div");
    left.innerHTML =
      '<div class="ssid">' + escapeHtml(n.ssid) + badges + '</div>' +
      '<div class="meta">' + escapeHtml(n.security || "open") + '</div>';
    var right = document.createElement("div");
    right.className = "right";
    right.innerHTML =
      '<span class="lock">' + (n.security && n.security !== "--" ? "🔒" : "") + '</span>' +
      '<span class="bars">' + bars(n.signal) + '</span>';
    row.appendChild(left); row.appendChild(right);
    row.addEventListener("click", function () { selectNetwork(n); });
    netsEl.appendChild(row);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function scan() {
    netsEl.innerHTML = '<div class="loading">Scanning…</div>';
    fetch("/api/wifi/scan", { method: "POST" })
      .then(function (r) { return r.json(); })
      .then(function (d) { renderNetworks(d.networks || []); })
      .catch(function (e) { netsEl.innerHTML = '<div class="empty">Scan failed: ' + escapeHtml(e.message) + '</div>'; });
  }

  function selectNetwork(n) {
    selectedSsid = n.ssid;
    selectedSecurity = n.security || "";
    selSsidEl.textContent = n.ssid;
    password = "";
    useSaved = !!n.known;
    pwVisible = false;
    togglePw.textContent = "Show";
    togglePw.style.visibility = useSaved ? "hidden" : "visible";
    renderPassword();
    // If open network, skip the password step and connect immediately
    if (!n.security || n.security === "--" || n.security === "") {
      doConnect();
      return;
    }
    // Saved network: no need to re-enter the password. Tapping Connect will
    // reuse the stored NetworkManager credentials. Typing overrides.
    if (useSaved) {
      pwHint.textContent = "Saved — tap Connect to use, or type to enter a new password.";
    } else {
      pwHint.textContent = "";
    }
    connectPanel.classList.add("open");
  }

  function renderPassword() {
    if (!password && useSaved) {
      pwDisplay.textContent = "••••••••";
      pwDisplay.className = "pw-display saved-placeholder";
      return;
    }
    if (!password) {
      pwDisplay.textContent = "Password";
      pwDisplay.className = "pw-display empty";
      return;
    }
    pwDisplay.className = "pw-display" + (pwVisible ? "" : " masked");
    pwDisplay.textContent = pwVisible ? password : "•".repeat(password.length);
  }

  function buildKeyboard() {
    var rowsAbc = [
      ["q","w","e","r","t","y","u","i","o","p"],
      ["a","s","d","f","g","h","j","k","l"],
      ["⇧","z","x","c","v","b","n","m","⌫"],
      ["123",",","space",".","↵"]
    ];
    var rowsABC = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["⇧","Z","X","C","V","B","N","M","⌫"],
      ["123",",","space",".","↵"]
    ];
    var rowsSym = [
      ["1","2","3","4","5","6","7","8","9","0"],
      ["!","@","#","$","%","&","*","(",")"],
      ["-","_","=","+","/","?",":",";","⌫"],
      ["abc","'","space",'"',"↵"]
    ];
    var set = kbMode === "ABC" ? rowsABC : kbMode === "sym" ? rowsSym : rowsAbc;
    kbEl.innerHTML = "";
    set.forEach(function (row) {
      var r = document.createElement("div");
      r.className = "kb-row";
      row.forEach(function (ch) {
        var btn = document.createElement("button");
        btn.className = "key";
        btn.type = "button";
        if (ch === "space") { btn.className += " wide2"; btn.textContent = "␣ Space"; }
        else if (ch === "⌫" || ch === "⇧" || ch === "123" || ch === "abc" || ch === "↵") {
          btn.className += " mod";
          if (kbMode === "ABC" && ch === "⇧") btn.className += " active";
          btn.textContent = ch === "↵" ? "↵ Enter" : ch;
          if (ch === "↵") btn.className += " accent";
        } else {
          btn.textContent = ch;
        }
        btn.addEventListener("click", function () { handleKey(ch); });
        r.appendChild(btn);
      });
      kbEl.appendChild(r);
    });
  }

  function handleKey(ch) {
    if (ch === "⌫") {
      if (useSaved && !password) { return; } // saved placeholder — nothing to delete
      password = password.slice(0, -1); renderPassword(); return;
    }
    if (ch === "⇧") { kbMode = kbMode === "ABC" ? "abc" : "ABC"; buildKeyboard(); return; }
    if (ch === "123") { kbMode = "sym"; buildKeyboard(); return; }
    if (ch === "abc") { kbMode = "abc"; buildKeyboard(); return; }
    if (ch === "↵") { doConnect(); return; }
    // Any real character input means the user is overriding the saved password.
    if (useSaved) {
      useSaved = false;
      togglePw.style.visibility = "visible";
      pwHint.textContent = "Entering a new password will replace the saved one.";
    }
    if (ch === "space") { password += " "; renderPassword(); return; }
    password += ch;
    // Auto-revert to lowercase after one uppercase letter
    if (kbMode === "ABC") { kbMode = "abc"; buildKeyboard(); }
    renderPassword();
  }

  function doConnect() {
    if (!selectedSsid) return;
    var body = { ssid: selectedSsid };
    if (useSaved && !password) {
      body.use_saved = true;
    } else {
      body.password = password;
    }
    toast("Connecting to " + selectedSsid + "…", "", 60000);
    fetch("/api/wifi/connect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    }).then(function (r) { return r.json(); }).then(function (d) {
      if (d.ok) {
        toast("Connected to " + selectedSsid + " ✓", "ok", 3500);
        connectPanel.classList.remove("open");
        password = "";
        useSaved = false;
        pwHint.textContent = "";
        setTimeout(function () { refreshStatus(); scan(); }, 1500);
        // Auto-return to player after 4 seconds
        setTimeout(function () { exitSettings(); }, 4000);
      } else {
        toast("Failed: " + (d.message || d.error || "unknown"), "err", 5000);
      }
    }).catch(function (e) { toast("Error: " + e.message, "err", 5000); });
  }

  $("rescanBtn").addEventListener("click", scan);
  $("closeBtn").addEventListener("click", function () { exitSettings(); });
  $("cancelBtn").addEventListener("click", function () {
    connectPanel.classList.remove("open");
    password = ""; useSaved = false; pwHint.textContent = "";
    renderPassword();
  });
  $("connectBtn").addEventListener("click", doConnect);
  togglePw.addEventListener("click", function () {
    pwVisible = !pwVisible;
    togglePw.textContent = pwVisible ? "Hide" : "Show";
    renderPassword();
  });

  buildKeyboard();
  refreshStatus();
  scan();
  setInterval(refreshStatus, 10000);
}());
</script>
</body>
</html>
