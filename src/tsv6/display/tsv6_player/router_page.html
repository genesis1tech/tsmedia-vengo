<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, height=1280, initial-scale=1.0">
<title>TSV6 Layout</title>
<style>
  /*
   * TSV6 router page — loaded by Chromium kiosk at http://localhost:8765/
   *
   * Required zones (do not remove or rename):
   *   #full    — full-screen container
   *   #main    — primary content area; transparent when VLC renders behind it
   *   #ticker  — ticker bar / branded footer
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Arial Black", Arial, sans-serif;
  }

  /* Full-screen container */
  #full {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* Main content zone — leaves space at bottom for the TSV6 footer except
     when the Vengo web player is active. Vengo must occupy the full screen
     and the ticker is layered over it. */
  #main {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: calc(100% - var(--tsv6-ticker-h, 60px));
    background: #000;
    overflow: hidden;
    transition: background-color 0.1s ease;
  }
  body.product-active #main {
    height: 100%;
  }
  body.vengo-active #main {
    height: 100%;
  }

  /* Transparent state — used when VLC renders behind this zone */
  #main.video-zone {
    background: transparent !important;
  }

  /* iframe used for HTML assets — fills the entire #main zone */
  #main-iframe {
    display: none;
    width: 100%;
    height: 100%;
    border: none;
    background: transparent;
  }

  /* img used for image assets — centred, object-fit contain */
  #main-image {
    display: none;
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
  }

  /* Product display: full-screen proportional image on a white canvas */
  #product-container {
    display: none;
    position: relative;
    width: 100%;
    height: 100%;
    flex-direction: column;
    background: #ffffff;
    transform: translateY(-105%);
    will-change: transform;
    z-index: 4;
  }

  #product-container.product-visible {
    animation: product-drop-in 360ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  #product-container.product-exiting {
    animation: product-drop-out 300ms cubic-bezier(0.7, 0, 0.84, 0) both;
  }

  @keyframes product-drop-in {
    from { transform: translateY(-105%); }
    to   { transform: translateY(0); }
  }

  @keyframes product-drop-out {
    from { transform: translateY(0); }
    to   { transform: translateY(-105%); }
  }

  /* Image area — preserves image aspect ratio above the product details */
  #product-image-wrap {
    width: 100%;
    height: 74%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #ffffff;
  }

  #product-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center center;
  }

  /* Brand + title beneath the image */
  #product-info {
    width: 100%;
    height: 26%;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #111111;
    background: #ffffff;
    padding: 8px 28px 28px;
    box-sizing: border-box;
  }
  #product-info-brand {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #d91e18;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #product-info-name {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 34px;
    line-height: 1.15;
    word-wrap: break-word;
  }

  /* Text-only product card — shown for first-scan cold UPC where the
     master_products row has not yet been populated with a WebP URL.
     Kept centered, white-on-black, large readable type. */
  #product-text {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: #ffffff;
    background: #000000;
    padding: 40px 24px;
    box-sizing: border-box;
  }
  #product-text-name {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 48px;
    line-height: 1.15;
    margin-bottom: 16px;
    word-wrap: break-word;
  }
  #product-text-brand {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 30px;
    color: #d91e18;
    margin-bottom: 24px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #product-text-desc {
    font-family: Arial, sans-serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.4;
    max-width: 90%;
    color: #cccccc;
  }

  /* Idle placeholder shown when no command has arrived yet */
  #idle-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    color: #666;
    font-size: 18px;
    letter-spacing: 1px;
    gap: 24px;
  }
  #idle-title {
    text-align: center;
  }
  #idle-ip-address {
    color: #777;
    font-family: Arial, sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1.3;
    text-align: center;
  }

  /* WiFi settings button on the idle/ready screen */
  #wifi-settings-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    margin-top: 16px;
    background: #1a1d28;
    color: #8a93a8;
    border: 1px solid #2a3142;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s, color .15s, border-color .15s;
    z-index: 10;
  }
  #wifi-settings-btn:hover,
  #wifi-settings-btn:active {
    background: #3d8bfd;
    color: #fff;
    border-color: #3d8bfd;
  }
  #wifi-settings-btn svg {
    width: 22px;
    height: 22px;
    fill: currentColor;
  }

  /* ── Dynamic ticker footer ───────────────────────────────────────────────── */
  #ticker {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: var(--tsv6-ticker-h, 60px);
    background: var(--tsv6-ticker-bg, #d91e18);
    color: var(--tsv6-ticker-color, #ffffff);
    font-family: var(--tsv6-ticker-font, "Arial Black"), "Arial Black", "Arial Bold", Arial, sans-serif;
    font-weight: var(--tsv6-ticker-weight, 900);
    font-style: var(--tsv6-ticker-style, normal);
    font-size: var(--tsv6-ticker-size, 32px);
    line-height: var(--tsv6-ticker-h, 60px);
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 100;
    overflow: hidden;
    white-space: nowrap;
  }
  body.product-active #ticker {
    display: none;
  }
  /* Fallback branded footer label — shown when no dynamic ticker is set. */
  #ticker-content {
    display: block;
    width: 100%;
    height: var(--tsv6-ticker-h, 60px);
    line-height: var(--tsv6-ticker-h, 60px);
    white-space: nowrap;
  }
  /* Scrolling marquee variant — enabled via .scroll class when ticker.behavior=scroll.
     The element must be inline-block with auto width so its own box width equals
     (container + text). translateX(-100%) then moves the whole thing left by exactly
     that amount, so the last glyph's right edge lands at the container's left edge. */
  #ticker.scroll { text-align: left; }
  #ticker.scroll #ticker-content {
    display: inline-block;
    width: auto;
    padding-left: 100%;
    animation: tsv6-ticker-scroll var(--tsv6-ticker-duration, 20s) linear infinite;
  }
  @keyframes tsv6-ticker-scroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-100%); }
  }

  /* Hide any PiSignage branding */
  #poweredby,
  .powered-by,
  a[href*="pisignage.com"],
  [class*="pisignage-footer"] {
    display: none !important;
    visibility: hidden !important;
    height: 0 !important;
  }
</style>
</head>
<body>
  <div id="full">
    <div id="main">
      <!-- HTML asset iframe -->
      <iframe id="main-iframe" sandbox="allow-scripts allow-same-origin" title="HTML asset"></iframe>

      <!-- Image asset -->
      <img id="main-image" src="" alt="Asset" />

      <!-- Product display: image above, brand/title beneath, plus a text-only
           card shown when no image URL is available (cold UPC first scan). -->
      <div id="product-container">
        <div id="product-image-wrap">
          <img id="product-image" src="" alt="Product" />
        </div>
        <div id="product-info">
          <div id="product-info-brand"></div>
          <div id="product-info-name"></div>
        </div>
        <div id="product-text" style="display:none;">
          <div id="product-text-name"></div>
          <div id="product-text-brand"></div>
          <div id="product-text-desc"></div>
        </div>
      </div>

      <!-- Vengo ad server web player iframe -->
      <iframe id="vengo-player" scrolling="no" style="display:none; width:100%; height:100%; border:0; background:#000; position:absolute; top:0; left:0; z-index:1;"></iframe>

      <!-- Idle placeholder. Wi-Fi access is via long-press gesture (5s hold)
           or via the LXDE root-window menu when the kiosk is not running. -->
      <div id="idle-placeholder">
        <div id="idle-title">tsMedia Player Ready</div>
        <div id="idle-ip-address"></div>
      </div>
    </div>
    <!-- Dynamic footer; text is populated via the show_ticker command. -->
    <div id="ticker"><span id="ticker-content"></span></div>
  </div>

<script>
(function () {
  "use strict";

  // ── DOM element references ────────────────────────────────────────────────
  var mainZone       = document.getElementById("main");
  var mainIframe     = document.getElementById("main-iframe");
  var mainImage      = document.getElementById("main-image");
  var productCont    = document.getElementById("product-container");
  var productImage   = document.getElementById("product-image");
  var productInfo    = document.getElementById("product-info");
  var idlePh         = document.getElementById("idle-placeholder");
  var idleIpAddress  = document.getElementById("idle-ip-address");
  var tickerEl       = document.getElementById("ticker");
  var tickerContent  = document.getElementById("ticker-content");
  var idleIpUpdateInFlight = false;
  var idleIpUpdateTimer = null;
  var productHideTimer = null;

  function scheduleIdleIpAddressUpdate(delayMs) {
    if (!idleIpAddress) return;
    if (idleIpUpdateTimer !== null) {
      window.clearTimeout(idleIpUpdateTimer);
    }
    idleIpUpdateTimer = window.setTimeout(updateIdleIpAddress, delayMs);
  }

  function updateIdleIpAddress() {
    if (!idleIpAddress) return;
    if (idleIpUpdateInFlight) return;
    if (idleIpUpdateTimer !== null) {
      window.clearTimeout(idleIpUpdateTimer);
      idleIpUpdateTimer = null;
    }
    idleIpUpdateInFlight = true;
    fetch("/api/wifi/status", { cache: "no-store" })
      .then(function (response) { return response.json(); })
      .then(function (status) {
        idleIpAddress.textContent = status && status.ip ? status.ip : "";
      })
      .catch(function () {
        idleIpAddress.textContent = "";
      })
      .then(function () {
        idleIpUpdateInFlight = false;
        scheduleIdleIpAddressUpdate(60000);
      });
  }
  updateIdleIpAddress();

  // Lazy-load a Google Fonts family once per family name. The ticker height is
  // 60px, so the browser only needs a handful of weights; we request 400/700/900
  // plus italic variants so bold/italic toggles resolve to real glyphs.
  var loadedFonts = {};
  // Fonts matching this pattern are treated as system/local; we do not inject a
  // <link> for them (browser will fall back to installed fonts).
  var SYSTEM_FONT_RE = /^(Arial|Arial Black|Arial Bold|Helvetica|Times|Times New Roman|Georgia|Courier|Courier New|Verdana|Tahoma|Trebuchet MS|Impact|sans-serif|serif|monospace)$/i;
  function ensureGoogleFont(family) {
    if (!family) return;
    var key = family.trim();
    if (!key || loadedFonts[key] || SYSTEM_FONT_RE.test(key)) return;
    loadedFonts[key] = true;
    var href = "https://fonts.googleapis.com/css2?family=" +
      encodeURIComponent(key).replace(/%20/g, "+") +
      ":ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap";
    var link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = href;
    link.onerror = function () {
      // Network unreachable / family invalid — drop from cache so a later
      // update with a different family still gets a chance to load.
      delete loadedFonts[key];
      console.warn("TSV6: failed to load Google Font:", key);
    };
    document.head.appendChild(link);
  }

  // ── Helper: hide all content slots ───────────────────────────────────────
  function clearMain() {
    if (productHideTimer) {
      clearTimeout(productHideTimer);
      productHideTimer = null;
    }
    mainIframe.style.display     = "none";
    mainIframe.src               = "";
    mainImage.style.display      = "none";
    mainImage.src                = "";
    productCont.style.display    = "none";
    productCont.classList.remove("product-visible", "product-exiting");
    productImage.src             = "";
    if (productInfo) productInfo.style.display = "none";
    idlePh.style.display         = "none";
    document.body.classList.remove("product-active");
    document.body.classList.remove("vengo-active");
    mainZone.classList.remove("video-zone");
    // Re-enable the long-press catcher when leaving idle.
    var catcher = document.getElementById("tsv6-longpress-catcher");
    if (catcher) catcher.style.pointerEvents = "auto";
    // Hide Vengo ad iframe so overlays render correctly
    if (typeof stopVengoWatchdog === "function") stopVengoWatchdog();
    _vengoUrl = "";
    var vengoPlayer = document.getElementById("vengo-player");
    if (vengoPlayer) {
      vengoPlayer.style.display = "none";
      vengoPlayer.src = "";
    }
  }

  // ── Command handlers ──────────────────────────────────────────────────────

  /**
   * show_html — load an HTML asset in the iframe.
   * Expected: { action: "show_html", src: "filename.html" }
   */
  function handleShowHtml(cmd) {
    clearMain();
    mainIframe.src = "/assets/" + encodeURIComponent(cmd.src);
    mainIframe.style.display = "block";
  }

  /**
   * show_image — display an image asset.
   * Expected: { action: "show_image", src: "filename.jpg" }
   */
  function handleShowImage(cmd) {
    clearMain();
    mainImage.src = "/assets/" + encodeURIComponent(cmd.src);
    mainImage.style.display = "block";
  }

  /**
   * show_product — display a product image with brand + title beneath,
   * or a text-only card when no image URL is available.
   *
   * Expected (image present):
   *   { action: "show_product", image: "https://.../foo.webp" | "foo.webp",
   *     product_name?, product_brand?, product_desc?, qr_url? }
   * Expected (text-only fallback — first cold UPC scan):
   *   { action: "show_product", image: "" | null,
   *     product_name: "…", product_brand: "…", product_desc: "…",
   *     qr_url: "https://..." }
   */
  function handleShowProduct(cmd) {
    cmd = cmd || {};
    clearMain();
    var productText = document.getElementById("product-text");
    var nameEl  = document.getElementById("product-text-name");
    var brandEl = document.getElementById("product-text-brand");
    var descEl  = document.getElementById("product-text-desc");
    var infoBrandEl = document.getElementById("product-info-brand");
    var infoNameEl  = document.getElementById("product-info-name");

    var img = cmd.image ? String(cmd.image).trim() : "";
    var hasImage = img && img !== "null";

    if (hasImage) {
      // Accept either a full URL (http/https) or a bare filename in cache_dir.
      var src = /^https?:\/\//i.test(img)
        ? img
        : ("/assets/" + encodeURIComponent(img));
      productImage.src = src;
      productImage.style.display = "";
      if (productText) productText.style.display = "none";
      if (infoBrandEl) infoBrandEl.textContent = cmd.product_brand || "";
      if (infoNameEl)  infoNameEl.textContent  = cmd.product_name  || "";
      if (productInfo) productInfo.style.display = "flex";
    } else {
      // Cold UPC first scan — render the text-only card from the V2 payload.
      productImage.removeAttribute("src");
      productImage.style.display = "none";
      if (productInfo) productInfo.style.display = "none";
      if (nameEl)  nameEl.textContent  = cmd.product_name  || "";
      if (brandEl) brandEl.textContent = cmd.product_brand || "";
      if (descEl)  descEl.textContent  = cmd.product_desc  || "";
      if (productText) productText.style.display = "flex";
    }

    document.body.classList.add("product-active");
    productCont.style.display = "flex";
    productCont.classList.remove("product-visible", "product-exiting");
    void productCont.offsetHeight;
    productCont.classList.add("product-visible");
  }

  function handleHideProduct() {
    if (productHideTimer) {
      clearTimeout(productHideTimer);
      productHideTimer = null;
    }
    if (!productCont || productCont.style.display === "none") {
      document.body.classList.remove("product-active");
      return;
    }
    productCont.classList.remove("product-visible");
    productCont.classList.add("product-exiting");
    productHideTimer = setTimeout(function () {
      productCont.style.display = "none";
      productCont.classList.remove("product-exiting");
      document.body.classList.remove("product-active");
      productHideTimer = null;
    }, 320);
  }

  /**
   * show_video_zone — make #main transparent so VLC renders behind Chromium.
   * Expected: { action: "show_video_zone", zone: "main", rect: [x,y,w,h] }
   * Reports the actual pixel rect back to Python via POST /video_zone_rect.
   */
  function handleShowVideoZone(cmd) {
    clearMain();
    mainZone.classList.add("video-zone");

    // Always measure the actual bounding rect of #main in screen coordinates.
    // This accounts for dynamic ticker height via --tsv6-ticker-h.
    var r = mainZone.getBoundingClientRect();
    var rect = [
      Math.round(r.left   + window.screenX),
      Math.round(r.top    + window.screenY),
      Math.round(r.width),
      Math.round(r.height)
    ];

    fetch("/video_zone_rect", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ rect: rect })
    }).catch(function (err) {
      console.warn("video_zone_rect POST failed:", err);
    });
  }

  /**
   * hide_video_zone — restore #main background.
   */
  function handleHideVideoZone() {
    mainZone.classList.remove("video-zone");
  }

  /**
   * show_idle — show the idle placeholder; VLC is responsible for looping
   * idle videos behind the transparent zone if previously set up.
   */
  function handleShowIdle() {
    clearMain();
    updateIdleIpAddress();
    idlePh.style.display = "flex";
    // Hide the long-press catcher so the WiFi settings button is tappable.
    var catcher = document.getElementById("tsv6-longpress-catcher");
    if (catcher) catcher.style.pointerEvents = "none";
  }

  /**
   * show_ticker — update the red footer text and style.
   *   cmd.text        : string shown in the footer
   *   cmd.enabled     : if false, clear the ticker text
   *   cmd.scroll      : true to animate as a horizontal marquee
   *   cmd.speed       : 1–10, higher is faster (scroll duration = ~60s/speed)
   *   cmd.fontFamily  : Google Fonts family name or a system font ("Roboto", "Arial Black", …)
   *   cmd.fontSizePct : text size as a % of the 60px ticker height (e.g. 55 → 33px)
   *   cmd.color       : CSS color for the text
   *   cmd.background  : CSS color for the ticker bar
   *   cmd.bold        : shortcut for weight 900 (overridden by explicit fontWeight)
   *   cmd.italic      : apply italic style
   *   cmd.fontWeight  : explicit numeric CSS font-weight (100–900)
   */
  function handleShowTicker(cmd) {
    cmd = cmd || {};
    var text = (cmd.enabled && cmd.text) ? String(cmd.text) : "";
    tickerContent.textContent = text;
    var scroll = !!(cmd.enabled && cmd.scroll);
    tickerEl.classList.toggle("scroll", scroll);
    if (scroll) {
      var speed = Math.max(1, Math.min(10, Number(cmd.speed) || 3));
      // PiSignage textSpeed 1=slow, 10=fast. Map to scroll duration:
      // speed 1 → 40s, speed 5 → 16s, speed 10 → 8s
      var dur = Math.max(4, 40 / speed);
      tickerEl.style.setProperty("--tsv6-ticker-duration", dur.toFixed(1) + "s");
    }

    var style = tickerEl.style;

    // Ticker height from server (e.g. 300) — resizes the bar and adjusts
    // #main to leave room. Falls back to 60px when zero/absent.
    var tickerH = Number(cmd.tickerHeight);
    if (tickerH && tickerH > 0) {
      tickerH = Math.max(20, Math.min(400, tickerH));
      style.setProperty("--tsv6-ticker-h", tickerH + "px");
      // Also set on document root so #main picks it up.
      document.documentElement.style.setProperty("--tsv6-ticker-h", tickerH + "px");
    } else {
      style.removeProperty("--tsv6-ticker-h");
      document.documentElement.style.removeProperty("--tsv6-ticker-h");
    }

    // Font family (lazy-load from Google Fonts when not a system font).
    if (cmd.fontFamily) {
      var fam = String(cmd.fontFamily).trim();
      ensureGoogleFont(fam);
      // Quote family names that contain whitespace so CSS parses them as one token.
      var famCss = /\s/.test(fam) ? '"' + fam.replace(/"/g, '') + '"' : fam;
      style.setProperty("--tsv6-ticker-font", famCss);
    } else {
      style.removeProperty("--tsv6-ticker-font");
    }

    // Font size as % of the ticker's 60px height.
    var sizePct = Number(cmd.fontSizePct);
    if (sizePct && sizePct > 0) {
      var clamped = Math.max(10, Math.min(100, sizePct));
      var tickerH = tickerEl.getBoundingClientRect().height || 60;
      style.setProperty("--tsv6-ticker-size", Math.round(tickerH * clamped / 100) + "px");
    } else {
      style.removeProperty("--tsv6-ticker-size");
    }

    // Color / background.
    if (cmd.color) {
      style.setProperty("--tsv6-ticker-color", String(cmd.color));
    } else {
      style.removeProperty("--tsv6-ticker-color");
    }
    if (cmd.background) {
      style.setProperty("--tsv6-ticker-bg", String(cmd.background));
    } else {
      style.removeProperty("--tsv6-ticker-bg");
    }

    // Weight — explicit numeric wins; otherwise use the `bold` shortcut.
    var explicitWeight = Number(cmd.fontWeight);
    if (explicitWeight && explicitWeight >= 100 && explicitWeight <= 900) {
      style.setProperty("--tsv6-ticker-weight", String(explicitWeight));
    } else if (cmd.bold) {
      style.setProperty("--tsv6-ticker-weight", "900");
    } else if (cmd.bold === false && cmd.fontFamily) {
      // Caller explicitly un-bolded a custom font — drop to 400 so the
      // loaded Google Font shows its regular weight instead of the default 900.
      style.setProperty("--tsv6-ticker-weight", "400");
    } else {
      style.removeProperty("--tsv6-ticker-weight");
    }

    // Italic.
    if (cmd.italic) {
      style.setProperty("--tsv6-ticker-style", "italic");
    } else {
      style.removeProperty("--tsv6-ticker-style");
    }

    // Raw CSS escape hatch — appended as a single style attribute suffix so
    // the preceding properties still apply. Stored on a data attribute so a
    // subsequent call with a different value cleanly replaces it.
    // Skip font-size/height/line-height from customCss — those are handled
    // by the ticker height and font size variables above.
    var prevCssKeys = tickerEl.dataset.tsv6CssKeys ? tickerEl.dataset.tsv6CssKeys.split(",") : [];
    prevCssKeys.forEach(function (k) { if (k) style.removeProperty(k); });
    var nextKeys = [];
    if (cmd.customCss) {
      String(cmd.customCss).split(";").forEach(function (decl) {
        var idx = decl.indexOf(":");
        if (idx < 0) return;
        var prop = decl.slice(0, idx).trim().toLowerCase();
        var val  = decl.slice(idx + 1).trim();
        if (prop && val && prop !== "font-size" && prop !== "height" && prop !== "line-height") {
          style.setProperty(prop, val);
          nextKeys.push(prop);
        }
      });
    }
    tickerEl.dataset.tsv6CssKeys = nextKeys.join(",");
  }

  // ── Vengo ad server handlers ──────────────────────────────────────────────
  var _vengoUrl = "";
  var _vengoLastActivityAt = 0;
  var _vengoWatchdogTimer = null;
  var _VENGO_STALL_REFRESH_MS = 10 * 60 * 1000;

  function vengoCacheBustUrl(url) {
    var separator = url.indexOf("?") === -1 ? "?" : "&";
    return url + separator + "_t=" + Date.now();
  }

  function noteVengoActivity() {
    _vengoLastActivityAt = Date.now();
  }

  function refreshVengoIdle(reason) {
    var iframe = document.getElementById("vengo-player");
    if (!iframe || !_vengoUrl || iframe.style.display === "none") return;
    console.warn("Vengo: refreshing iframe (" + reason + ")");
    noteVengoActivity();
    iframe.src = vengoCacheBustUrl(_vengoUrl);
  }

  function startVengoWatchdog() {
    stopVengoWatchdog();
    noteVengoActivity();
    _vengoWatchdogTimer = window.setInterval(function() {
      if (!_vengoUrl) {
        stopVengoWatchdog();
        return;
      }
      var inactiveFor = Date.now() - _vengoLastActivityAt;
      if (inactiveFor >= _VENGO_STALL_REFRESH_MS) {
        refreshVengoIdle("no activity for " + Math.round(inactiveFor / 1000) + "s");
      }
    }, 60 * 1000);
  }

  function stopVengoWatchdog() {
    if (_vengoWatchdogTimer) {
      window.clearInterval(_vengoWatchdogTimer);
      _vengoWatchdogTimer = null;
    }
  }

  function handleShowVengoIdle(cmd) {
    clearMain();
    var url = cmd.url || "";
    if (!url) {
      console.warn("show_vengo_idle: no URL provided");
      handleShowIdle();
      return;
    }
    _vengoUrl = url;
    document.body.classList.add("vengo-active");
    var iframe = document.getElementById("vengo-player");
    noteVengoActivity();
    iframe.src = url;
    iframe.style.display = "block";
    startVengoWatchdog();
  }

  function handleHideVengoIdle() {
    stopVengoWatchdog();
    var iframe = document.getElementById("vengo-player");
    if (iframe) {
      iframe.style.display = "none";
      iframe.src = "";
    }
    _vengoUrl = "";
    document.body.classList.remove("vengo-active");
  }

  // ── SSE dispatcher ────────────────────────────────────────────────────────
  var HANDLERS = {
    "show_html":        handleShowHtml,
    "show_image":       handleShowImage,
    "show_product":     handleShowProduct,
    "hide_product":     handleHideProduct,
    "show_video_zone":  handleShowVideoZone,
    "hide_video_zone":  handleHideVideoZone,
    "show_idle":        handleShowIdle,
    "show_ticker":      handleShowTicker,
    "show_vengo_idle":  handleShowVengoIdle,
    "hide_vengo_idle":  handleHideVengoIdle
  };

  function dispatch(cmd) {
    var handler = HANDLERS[cmd.action];
    if (handler) {
      handler(cmd);
    } else {
      console.warn("TSV6: unknown action:", cmd.action);
    }
  }

  // ── Vengo web player message listener ─────────────────────────────────────
  window.addEventListener("message", function(event) {
    var msg = event.data;
    if (msg === "ALL_ADS_COMPLETED") {
      console.log("Vengo: all ads completed — refreshing");
      refreshVengoIdle("all ads completed");
    } else if (msg === "AD_ERROR") {
      console.warn("Vengo: ad error — refreshing idle player");
      refreshVengoIdle("ad error");
    } else if (msg === "STARTED") {
      noteVengoActivity();
      console.log("Vengo: ad started");
    } else if (msg === "COMPLETE") {
      noteVengoActivity();
      console.log("Vengo: ad complete");
    } else if (msg === "ON_ADS_MANAGER_LOADED") {
      noteVengoActivity();
      console.log("Vengo: ads manager loaded");
    }
  });

  var _vengoIframe = document.getElementById("vengo-player");
  if (_vengoIframe) {
    _vengoIframe.addEventListener("load", function() {
      if (_vengoUrl) noteVengoActivity();
      console.log("Vengo: iframe loaded");
    });
    _vengoIframe.addEventListener("error", function() {
      refreshVengoIdle("iframe error");
    });
  }

  // ── Connect to SSE stream ─────────────────────────────────────────────────
  function connectSSE() {
    var es = new EventSource("/events");

    es.onmessage = function (event) {
      try {
        var cmd = JSON.parse(event.data);
        dispatch(cmd);
      } catch (e) {
        console.error("TSV6: failed to parse SSE data:", event.data, e);
      }
    };

    es.onerror = function () {
      console.warn("TSV6: SSE connection lost; will reconnect automatically.");
      // EventSource reconnects automatically; no manual retry needed.
    };
  }

  // Start SSE after the DOM is ready (it already is at this point, but
  // defer slightly to let Chromium finish layout so getBoundingClientRect
  // returns accurate values).
  window.addEventListener("load", function () {
    connectSSE();
    // Show idle placeholder on initial load.
    handleShowIdle();
  });

  // Long-press-anywhere (5s) to open /settings.
  //
  // The player uses #main-iframe and VLC render zones which capture events and
  // prevent bubbling to document. To receive every press regardless of what's
  // below, we install a fullscreen transparent overlay DIV at the top of the
  // z-stack. The overlay listens for pointer/touch/mouse events directly, so
  // iframes, images, and VLC-backed transparent zones can't steal them.
  //
  // Signage mode has no other required touch interactions, so a capturing
  // overlay is safe here. If interactive content is ever needed inside the
  // iframe, this overlay can be toggled off while the content is active.
  (function installLongPress() {
    var LONG_PRESS_MS = 5000;
    var DRIFT_PX = 40;
    var startT = 0, startX = 0, startY = 0;
    var timerId = null, rafId = null;

    // Fullscreen invisible catcher above all other content
    var catcher = document.createElement("div");
    catcher.id = "tsv6-longpress-catcher";
    catcher.style.cssText = [
      "position:fixed","inset:0","left:0","top:0","right:0","bottom:0",
      "width:100vw","height:100vh",
      "z-index:2147483646",            // just below the ring
      "background:transparent",
      "pointer-events:auto",
      "touch-action:none",             // tell browser not to interpret as scroll/zoom
      "-webkit-tap-highlight-color:transparent",
      "cursor:default",
    ].join(";");

    // Radial progress ring sits above the catcher so it's visible
    var ring = document.createElement("div");
    ring.id = "tsv6-longpress-ring";
    ring.style.cssText = [
      "position:fixed","pointer-events:none","z-index:2147483647",
      "left:0","top:0","width:110px","height:110px",
      "margin-left:-55px","margin-top:-55px",
      "border-radius:50%",
      "box-shadow:0 0 18px rgba(0,0,0,0.6)",
      "transition:opacity .12s","opacity:0",
      "background:conic-gradient(#3d8bfd 0deg, rgba(61,139,253,0.15) 0deg)",
    ].join(";");

    function attach() {
      if (!document.body) return setTimeout(attach, 50);
      document.body.appendChild(catcher);
      document.body.appendChild(ring);
    }
    attach();

    function setRing(x, y, progress) {
      ring.style.left = x + "px";
      ring.style.top = y + "px";
      ring.style.opacity = progress > 0 ? "1" : "0";
      var deg = Math.max(0, Math.min(360, progress * 360));
      ring.style.background =
        "conic-gradient(#3d8bfd " + deg + "deg, rgba(61,139,253,0.15) " + deg + "deg)";
    }
    function tick() {
      if (!timerId) return;
      var pct = Math.min(1, (performance.now() - startT) / LONG_PRESS_MS);
      setRing(startX, startY, pct);
      rafId = requestAnimationFrame(tick);
    }
    function cancel() {
      if (timerId) { clearTimeout(timerId); timerId = null; }
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      ring.style.opacity = "0";
    }
    function fire() {
      timerId = null;
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      window.location.href = "/settings";
    }
    function start(x, y) {
      cancel();
      startT = performance.now();
      startX = x; startY = y;
      timerId = setTimeout(fire, LONG_PRESS_MS);
      rafId = requestAnimationFrame(tick);
    }
    function move(x, y) {
      if (timerId && (Math.abs(x - startX) > DRIFT_PX || Math.abs(y - startY) > DRIFT_PX)) cancel();
    }

    // Attach to the catcher, not document — events would never bubble past
    // iframe/image content otherwise.
    if (window.PointerEvent) {
      catcher.addEventListener("pointerdown", function (e) { start(e.clientX, e.clientY); });
      catcher.addEventListener("pointermove", function (e) { if (timerId) move(e.clientX, e.clientY); });
      catcher.addEventListener("pointerup", cancel);
      catcher.addEventListener("pointercancel", cancel);
      catcher.addEventListener("pointerleave", cancel);
    }
    catcher.addEventListener("touchstart", function (e) {
      if (e.touches && e.touches.length) start(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    catcher.addEventListener("touchmove", function (e) {
      if (e.touches && e.touches.length) move(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    catcher.addEventListener("touchend", cancel, { passive: true });
    catcher.addEventListener("touchcancel", cancel, { passive: true });
    catcher.addEventListener("mousedown", function (e) { start(e.clientX, e.clientY); });
    catcher.addEventListener("mousemove", function (e) { if (timerId) move(e.clientX, e.clientY); });
    catcher.addEventListener("mouseup", cancel);
    catcher.addEventListener("mouseleave", cancel);
  }());
}());
</script>
</body>
</html>
