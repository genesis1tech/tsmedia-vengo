# TSV6 WiFi Production Hardening for NetworkManager
# Install to: /etc/NetworkManager/conf.d/99-tsv6-wifi-production.conf
#
# NOTE: connection.autoconnect-retries is NOT supported as a global default
# in NM 1.52+.  It must be set per-connection via:
#   nmcli connection modify <name> connection.autoconnect-retries 0
# The install-wifi-hardening.sh script handles this automatically.

[connection]
# Disable WiFi power management.  Broadcom chip enters low-power mode
# that drops MQTT keepalives and causes random disconnections.
# 2 = NM_SETTING_WIRELESS_POWERSAVE_DISABLE
wifi.powersave=2

[device]
# Stable MACs for DHCP reservations and device identification.
wifi.scan-rand-mac-address=no

[logging]
# Reduce NM logging noise in production
level=WARN
