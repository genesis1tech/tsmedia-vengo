# TSV6 Hardware Watchdog Configuration
# Install to: /etc/systemd/system.conf.d/tsv6-watchdog.conf
#
# Enables the BCM2835 hardware watchdog via systemd.
# If systemd or the kernel stops responding for 15 seconds,
# the SoC hardware watchdog triggers a hard reboot.
#
# Requires: dtparam=watchdog=on in /boot/firmware/config.txt

[Manager]
RuntimeWatchdogSec=15
